<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>use-digit-mask</title>
    <!--
      GitHub Pages serves this file for every path that has no matching file.
      The script below encodes the requested path as a query-string so the
      browser is redirected to index.html, which then restores the real path
      via history.replaceState (see the inline script in index.html).
      Based on: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
